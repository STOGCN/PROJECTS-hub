<div class="game-layout-container">
    <!-- Left Section: Board and Future Features -->
    <div class="board-section">
        <!-- Top Player -->
        <div class="player-profile top-player">
            <div class="player-info">
                <img src="assets/avatar-opponent.png" alt="Opponent" class="player-avatar" onerror="this.src='assets/pieces/black%20knight.svg'" />
                <span class="player-name">Opponent</span>
            </div>
            <div class="player-timer" 
                [ngClass]="{
                    'active-timer': isTimerActive(flipMode ? Color.White : Color.Black),
                    'low-time': isLowTime(flipMode ? whiteTime : blackTime)
                }">
                {{ formatTime(flipMode ? whiteTime : blackTime) }}
            </div>
        </div>

        <div class="chess-board" [ngClass]="{'rotated': flipMode}">
            <div *ngFor="let row of chessBoardView; let x = index" class="row">
                <div *ngFor="let piece of row; let y = index" class="square" [ngClass]="{'dark': isSquareDark(x, y), 
                    'light':!isSquareDark(x, y),
                    'selected-square': isSquareSelected(x, y),
                    'last-move': isSquareLastMove(x, y),
                    'king-in-check': isSquareChecked(x, y),
                    'promotion-square': isSquarePromotionSquare(x, y)
                }" (click)="move(x, y)">

                    <div [ngClass]="{'safe-square': isSquareSafeForSelectedPiece(x, y)}"></div>

                    <img *ngIf="piece" [src]="pieceImagePaths[piece]" [alt]="piece" class="piece"
                        [ngClass]="{'rotated': flipMode}">
                </div>
            </div>
        </div>

        <h2 *ngIf="gameOverMessage" class="game-over-message">
            {{gameOverMessage}}
        </h2>

        <!-- Bottom Player -->
        <div class="player-profile bottom-player">
            <div class="player-info">
                <img src="assets/avatar-user.png" alt="You" class="player-avatar" onerror="this.src='assets/pieces/white%20knight.svg'" />
                <span class="player-name">You</span>
            </div>
            <div class="player-timer" 
                [ngClass]="{
                    'active-timer': isTimerActive(flipMode ? Color.Black : Color.White),
                    'low-time': isLowTime(flipMode ? blackTime : whiteTime)
                }">
                {{ formatTime(flipMode ? blackTime : whiteTime) }}
            </div>
        </div>

        <div *ngIf="isPromotionActive" class="promotion-dialog">
            <img *ngFor="let piece of promotionPieces()" [src]="pieceImagePaths[piece]" (click)="promotePiece(piece)">

            <span class="close-promotion-dialog" (click)="closePawnPromotionDialog()">
                &times;
            </span>
        </div>
    </div>

    <!-- Right Section: Sidebar -->
    <div class="sidebar-section">
        <div class="sidebar-tabs">
            <div class="sidebar-tab active">Analysis</div>
            <div class="sidebar-tab">New Game</div>
            <div class="sidebar-tab">Games</div>
            <div class="sidebar-tab">Players</div>
        </div>
        
        <div class="sub-tabs">
            <div class="sub-tab active">Moves</div>
            <div class="sub-tab">Info</div>
            <div class="sub-tab">Openings</div>
        </div>
        
        <div class="sidebar-content">
            <app-move-list [moveList]="moveList" [gameHistoryPointer]="gameHistoryPointer" [gameHistoryLength]="gameHistory.length"
                (showPreviousPositionEvent)="showPreviousPosition($event)">
            </app-move-list>
        </div>
        
        <div class="sidebar-footer">
            <button class="sidebar-btn" (click)="flipBoard()" title="Flip Board">Flip Board</button>
            <button class="sidebar-btn" title="Share">&#x1F517; Share</button>
            <button class="sidebar-btn" title="Settings">&#x2699; Settings</button>
        </div>
    </div>
</div>
