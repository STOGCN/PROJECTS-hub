<div class="dashboard-root">
  <!-- Dynamic Background Layer -->
  <div class="dynamic-bg-layer" 
       [style.backgroundImage]="dynamicBgStyle"
       [class.active]="isDynamicBg && currentBgUrl">
  </div>

  <!-- Background Accents -->
  <div class="bg-glow blue-glow"></div>
  <div class="bg-glow red-glow"></div>

  <app-header (newGameAction)="openNewGameModal()"></app-header>
  
  <main class="dashboard-content">
    <app-life-timer></app-life-timer>
    <app-game-carousel (backgroundChange)="onBackgroundChange($event)" 
                       (activeCardStatus)="onActiveCardStatus($event)">
    </app-game-carousel>
  </main>

  <app-footer [showActionButtons]="showFooterActions"></app-footer>

  <!-- Bg Toggle Button -->
  <button class="bg-toggle-btn" 
          (click)="toggleDynamicBg()" 
          [class.active]="isDynamicBg">
    <i class="bi bi-back"></i>
    <span class="tooltip">Toggle Dynamic Background</span>
  </button>

  <!-- Modals rendered at Dashboard level to escape stacking contexts -->
  <app-new-game *ngIf="isNewGameModalOpen" (close)="closeNewGameModal()"></app-new-game>
</div>
