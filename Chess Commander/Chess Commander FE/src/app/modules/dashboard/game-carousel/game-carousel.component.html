<div class="carousel-container"
     (pointerdown)="onPointerDown($event)"
     (pointerup)="onPointerUp($event)"
     (pointercancel)="onPointerUp($event)"
     (pointerleave)="onPointerUp($event)">
  <div *ngFor="let mission of missions; let i = index" 
       [ngClass]="getCardClass(i)"
       (click)="selectMission(i)">
    
    <!-- Active Card Internal Structure -->
    <ng-container *ngIf="i === activeIndex">
      <div class="card-header">
        <div class="game-clock-container">
          <span class="label">GAME CLOCK</span>
          <div class="clock-display">
            <span class="main">{{ mission.gameClock.split('.')[0] }}</span><span class="ms">.{{ mission.gameClock.split('.')[1] }}</span>
          </div>
        </div>
        <div class="critical-badge" *ngIf="mission.isCritical">
          <span class="pulse-dot"></span>
          <span>CRITICAL</span>
        </div>
      </div>

      <div class="chessboard-container">
        <div class="chess-board">
          <!-- 8x8 Grid -->
          <div class="grid-layer">
            <div *ngFor="let s of squares" class="square"></div>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <div class="footer-left">
          <span class="footer-label">STAKE OBJECT</span>
          <h3 class="stake-title">{{ mission.subtitle }}</h3>
        </div>
        <div class="footer-right">
          <span class="footer-label">GAME #{{ mission.gameNumber }}</span>
          <span class="turn-indicator">เทิร์นของคุณ</span>
        </div>
      </div>
    </ng-container>

    <!-- Side/Hidden Card Internal Structure -->
    <ng-container *ngIf="i !== activeIndex">
      <div class="card-image" [style.backgroundImage]="'url(\'' + mission.imageUrl + '\')'"></div>
      <div class="card-overlay">
        <span class="material-symbols-outlined" [class.lock-icon]="mission.isLocked" [class.time-icon]="!mission.isLocked">
          {{ mission.isLocked ? 'lock' : 'schedule' }}
        </span>
        <h3 class="mission-title">{{ mission.title }}</h3>
        <div class="mission-timer">{{ mission.timer }}</div>
      </div>
    </ng-container>
  </div>
</div>
