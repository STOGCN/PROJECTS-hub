<div class="new-game-overlay">
  <div class="new-game-modal glass-panel-heavy">
    
    <div class="modal-header">
      <div class="header-title-wrapper">
        <i class="bi bi-rocket-takeoff header-icon"></i>
        <h2 class="modal-title">INITIATE NEW PROTOCOL</h2>
      </div>
      <button class="close-btn" (click)="closeModal()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body">
      
      <!-- Left Column: Identity & Objective -->
      <div class="column left-col">
        <div class="input-group">
          <label class="control-label">PROTOCOL DESIGNATION (NAME)</label>
          <input type="text" class="heavy-input" [(ngModel)]="gameName" placeholder="e.g. Operation Knightfall">
        </div>

        <div class="input-group cover-upload-group">
          <label class="control-label">MISSION INTEL (COVER VISUAL)</label>
          <div class="image-upload-zone" 
               [class.has-image]="coverImage"
               (dragover)="onDragOver($event)" 
               (dragleave)="onDragLeave($event)" 
               (drop)="onDrop($event)"
               (click)="fileInput.click()">
            
            <input type="file" #fileInput class="hidden-input" (change)="onFileSelected($event)" accept="image/*">
            
            <div class="upload-placeholder" *ngIf="!coverImage">
              <i class="bi bi-cloud-upload upload-icon"></i>
              <p>DROP INTEL HERE OR CLICK TO BROWSE</p>
            </div>

            <img *ngIf="coverImage" [src]="coverImage" class="cover-preview" alt="Cover">
            <div class="overlay-hover" *ngIf="coverImage">
              <i class="bi bi-arrow-repeat"></i> REPLACE INTEL
            </div>
          </div>
        </div>

        <div class="input-group flex-grow-textarea">
          <label class="control-label">OBJECTIVE (GOAL)</label>
          <textarea class="heavy-textarea" [(ngModel)]="goal" placeholder="Define the primary objective for this engagement..."></textarea>
        </div>
      </div>

      <!-- Right Column: Parameters & Engine -->
      <div class="column right-col">
        
        <!-- Importance Level -->
        <div class="input-group">
          <label class="control-label">THREAT LEVEL (IMPORTANCE)</label>
          <div class="segmented-control">
            <button class="segment-btn" [class.active-casual]="importance === 'CASUAL'" (click)="setImportance('CASUAL')">CASUAL</button>
            <button class="segment-btn" [class.active-serious]="importance === 'SERIOUS'" (click)="setImportance('SERIOUS')">SERIOUS</button>
            <button class="segment-btn" [class.active-critical]="importance === 'CRITICAL'" (click)="setImportance('CRITICAL')">CRITICAL</button>
          </div>
        </div>

        <!-- The "Heavy" Time Setter -->
        <div class="input-group time-setter-group">
          <label class="control-label">CHRONO-LOCK (TIME LIMIT)</label>
          <div class="tactile-time-panel">
            <div class="time-adjuster">
              <button class="mech-btn minus-btn" (click)="decreaseTime()">
                <i class="bi bi-dash-lg"></i>
              </button>
              <div class="time-display-wrapper">
                <input type="number" class="time-number-input" [(ngModel)]="timeValue" min="0">
              </div>
              <button class="mech-btn plus-btn" (click)="increaseTime()">
                <i class="bi bi-plus-lg"></i>
              </button>
            </div>
            
            <div class="unit-selector">
              <button class="unit-btn" [class.active]="timeUnit === 'MINUTES'" (click)="setTimeUnit('MINUTES')">MIN.</button>
              <button class="unit-btn" [class.active]="timeUnit === 'DAYS'" (click)="setTimeUnit('DAYS')">DAYS</button>
              <button class="unit-btn" [class.active]="timeUnit === 'YEARS'" (click)="setTimeUnit('YEARS')">YEARS</button>
            </div>
          </div>
        </div>

        <!-- Play Mode -->
        <div class="input-group">
          <label class="control-label">ENGAGEMENT MODE</label>
          <div class="mode-selector">
            <div class="mode-card" [class.selected]="playMode === 'NONE'" (click)="setPlayMode('NONE')">
              <i class="bi bi-person-slash icon-large"></i>
              <span>NONE</span>
            </div>
            <div class="mode-card" [class.selected]="playMode === 'MANUAL'" (click)="setPlayMode('MANUAL')">
              <i class="bi bi-people icon-large"></i>
              <span>MANUAL</span>
            </div>
            <div class="mode-card stockfish-card" [class.selected]="playMode === 'STOCKFISH'" (click)="setPlayMode('STOCKFISH')">
              <i class="bi bi-cpu icon-large cpu-icon"></i>
              <span>STOCKFISH</span>
            </div>
          </div>
        </div>

        <!-- Stockfish Advanced (Only if Stockfish) -->
        <div class="stockfish-advanced-panel" [class.expanded]="playMode === 'STOCKFISH'">
          <div class="advanced-header" (click)="toggleAdvanced()">
            <span class="advanced-label">
              <i class="bi bi-sliders"></i> ADVANCED ENGINE SETTINGS
            </span>
            <i class="bi bi-chevron-down expand-icon" [class.rotated]="showAdvanced"></i>
          </div>
          
          <div class="advanced-content" *ngIf="showAdvanced">
            <div class="slider-group">
              <div class="slider-label-row">
                <label>CALCULATION DEPTH</label>
                <span class="slider-val">{{depth}}</span>
              </div>
              <input type="range" min="1" max="30" [(ngModel)]="depth" class="cyber-slider">
            </div>

            <div class="slider-group">
              <div class="slider-label-row">
                <label>MOVE TIME (MS)</label>
                <span class="slider-val">{{movetime}}</span>
              </div>
              <input type="range" min="100" max="10000" step="100" [(ngModel)]="movetime" class="cyber-slider">
            </div>

            <div class="slider-group">
              <div class="slider-label-row">
                <label>SKILL LEVEL</label>
                <span class="slider-val">{{skillLevel}}</span>
              </div>
              <input type="range" min="0" max="20" [(ngModel)]="skillLevel" class="cyber-slider">
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="modal-footer">
      <button class="action-btn cancel-btn" (click)="closeModal()">ABORT</button>
      <button class="action-btn engage-btn" (click)="startGame()">
        <i class="bi bi-lightning-fill"></i>
        AUTHORIZE ENGAGEMENT
      </button>
    </div>

  </div>
</div>
