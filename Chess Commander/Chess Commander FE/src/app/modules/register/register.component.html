<div class="registration-wrapper">
  <div class="overlay"></div>
  
  <div class="registration-card">
    <header class="registration-header">
      <div class="header-left">
        <div class="logo-container">
          <img src="assets/pieces/bK.svg" alt="Life Gamble Logo" class="logo-icon">
        </div>
        <div class="title-group">
          <h1 class="registration-title">LIFE GAMBLE</h1>
          <p class="registration-subtitle">PLAYER REGISTRATION PROTOCOL</p>
        </div>
      </div>
      <div class="header-right">
        <button type="button" class="btn-back" (click)='onBack()'>
          <span class="icon">←</span> Back
        </button>
        <button type="submit" form="registerForm" class="btn-save" [disabled]="!registerForm.form.valid">
          SAVE IDENTITY
        </button>
      </div>
    </header>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" id="registerForm" class="registration-form">
      
      <!-- Section 1: General Info -->
      <div class="form-section">
        <h2 class="section-title">GENERAL INFORMATION</h2>
        
        <div class="input-grid">
          <div class="input-group">
            <label class="input-label">FULL NAME</label>
            <input type="text" [(ngModel)]="profile.fullName" name="fullName" placeholder="Legal Identity" class="form-input" required>
          </div>
          <div class="input-group">
            <label class="input-label">GAME ALIAS</label>
            <input type="text" [(ngModel)]="profile.nickname" name="nickname" placeholder="Callsign" class="form-input" required>
          </div>
          <div class="input-group age-group">
            <label class="input-label">AGE</label>
            <input type="number" [(ngModel)]="profile.age" name="age" placeholder="Years" class="form-input" min="0" required>
          </div>
          <div class="input-group gender-group">
            <label class="input-label">GENDER</label>
            <select [(ngModel)]="profile.gender" name="gender" class="form-select" required>
              <option value="" disabled selected>Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Section 2: The Ultimate Goal -->
      <div class="form-section">
        <h2 class="section-title">THE ULTIMATE GOAL</h2>
        <div class="input-group full-width">
          <label class="input-label">YOUR DREAM / ABSOLUTE OBJECTIVE</label>
          <textarea [(ngModel)]="profile.goals" name="goals" placeholder="What is the one thing you are willing to risk everything for?" class="form-textarea"></textarea>
        </div>
      </div>

      <!-- Section 3: Reflective Analysis -->
      <div class="form-section">
        <h2 class="section-title">REFLECTIVE ANALYSIS</h2>
        
        <div class="reflection-grid">
          <div class="question-box">
            <label class="question-title">1. WHAT IS YOUR GREATEST FAILURE?</label>
            <textarea [(ngModel)]="profile.answers.question1" name="q1" placeholder="Be precise..." class="form-textarea mini"></textarea>
          </div>

          <div class="question-box">
            <label class="question-title">2. WHO DO YOU OWE THE MOST TO?</label>
            <textarea [(ngModel)]="profile.answers.question2" name="q2" placeholder="Name or debt..." class="form-textarea mini"></textarea>
          </div>

          <div class="question-box">
            <label class="question-title">3. WHAT DOES 'SACRIFICE' MEAN TO YOU?</label>
            <textarea [(ngModel)]="profile.answers.question3" name="q3" placeholder="Define your limits..." class="form-textarea mini"></textarea>
          </div>

          <div class="question-box">
            <label class="question-title">4. IF YOU WIN, WHO LOSES?</label>
            <textarea [(ngModel)]="profile.answers.question4" name="q4" placeholder="The cost of victory..." class="form-textarea mini"></textarea>
          </div>

          <div class="question-box full-width">
            <label class="question-title">5. WHY SHOULD THE SYSTEM CHOOSE YOU?</label>
            <textarea [(ngModel)]="profile.answers.question5" name="q5" placeholder="Your final justification..." class="form-textarea mini"></textarea>
          </div>
        </div>
      </div>
    </form>

    <!-- <footer class="registration-footer">
      <p class="footer-text">REGISTRATION DATA IS FINAL. NO AMENDMENTS PERMITTED AFTER SUBMISSION.</p>
    </footer> -->
  </div>
</div>
